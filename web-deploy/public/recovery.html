<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>URL 복구</title>
<style>
body { font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #2a2a2a; line-height: 1.75; }
h1 { font-size: 22px; margin-bottom: 16px; }
h2 { font-size: 15px; color: #666; margin: 24px 0 8px 0; letter-spacing: 1px; }
p { color: #444; margin-bottom: 12px; }
.note { background: #faf8f3; border-left: 3px solid #D4A848; padding: 14px 18px; margin: 16px 0; border-radius: 4px; font-size: 14px; }
a { color: #D4A848; }
</style>
</head>
<body>
<h1>URL 복구 안내</h1>
<p>개인 다이어리 URL을 분실하셨나요?</p>
<div class="note">
<strong>본인 확인 절차</strong><br>
생년월일과 이름을 통해 동일한 URL이 재생성됩니다. 운영자에게 다음 정보로 연락해 주세요:
<ul style="margin-top:8px; padding-left:20px;">
<li>구매 시 사용한 이름</li>
<li>생년월일시</li>
<li>(가능하면) 인쇄 다이어리 주문 번호</li>
</ul>
</div>
<p>URL은 결정론적으로 생성되므로 같은 출생 정보라면 동일한 URL이 나옵니다.</p>
<h2>URL이 노출되었을 때</h2>
<p>외부 노출 의심 시 새 토큰으로 회전 요청 가능. 이전 URL은 즉시 비활성화됩니다.</p>
<p style="margin-top:40px;"><a href="/">홈으로</a></p>
</body>
</html>
